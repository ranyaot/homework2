<!--

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style3.css"> <!--link to CSS file-->
        <!--displays text the browsers-->
        <title> Patient Registration Form | Hope Clinic </title>
    </head>
    <body>
        <header>
            <table width="100%">
            <tr>
                <td valign="top" align="left" width="20%">
                    <div class="logo">
                        <img src="logo1.png" alt="Hope Clinic Logo" width="70px" id="logo" />
                    </div>
                </td>
                <td>
                    <h2>Patient Registration Form | Hope Clinic </h2>
                </td>
    <td  class="td1" valign="bottom" align="right" width="20%">
        <!-- Date will go here -->
        Today's Date: <span id="today"></span>
    </td>
            </table>
        </header>
<hr>
<!--form begins here-->
<form id="signup" action="thankyou3.html">
        <div class="format">
            <table>
                <th colspan="4">Create Patient Portal Account</th>

                </tr>
                <!--patient's information section of form starts here-->
                <tr>
                    <td class="td1"><label for="fname">First Name:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="fname"
                        id="fname"
                        maxlength="30"
                        required
                        title="Letters only"
                        pattern="[a-zA-Z']{1,30}"
                        oninput="validateFname()"
                        onblur="validateFname()"
                        placeholder="Ex. John"
                        />
                    </br>   
                    <span class="error" id="fname-error"></span>
                    </td>  
                </tr>
                <tr>
                    <td class="td1"><label for="mini">Middle Initial:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="mini"
                        id="mini"
                        maxlength="1"
                        title="Letters only"
                        pattern="[a-zA-Z']{0,1}"
                        oninput="validateMini()"
                        onblur="validateMini()"
                        placeholder="Ex. A"/>
                    </br>   
                    <span class="error" id="mini-error"></span>
                    </td>  
                </tr>
                <tr>                
                    <td class="td1"><label for="lname">Last Name:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="lname"
                        id="lname"
                        maxlength="30"
                        required
                        title="Letters only"
                        pattern="[a-zA-Z']{1,30}"
                        oninput="validateLname()"
                        onblur="validateLname()"
                        placeholder="Ex. Smith"/>
                    </br>   
                    <span class="error" id="lname-error"></span>
                    </td>  
                </tr>
                <tr>
                    <td class="td1"><label for="psex">Patient's Sex</label> </td>
                    <td>
                        <input
                        type="radio"
                        id="Option1"
                        name="psex"
                        value="Male"
                        />
                        Male
                        <input
                        type="radio"
                        id="Option2"
                        name="psex"
                        value="Female"
                        />
                        Female
                        <input
                        type="radio"
                        id="Option3"
                        name="psex"
                        value="Other"
                        />
                        Other
                    </td>
                </tr>
                <tr>
                    <td class="td1"><label for="DOB">Date of Birth:</label></td>
                    <td>
                       <input 
                       type="date"
                       id="dob"
                       name="dob"
                       oninput="validateDob()"
                       onblur="validateDob()"
                       required
                       />
                    </br>   
                    <span class="error" id="dob-error"></span>   
                    </td>
                </tr>
                <tr>
                    <td class="td1"><label for="ssn">SSN:</label></td>
                    <td>
                        <input
                            type="password"
                            minlength="11"
                            maxlength="11"
                            name="ssn"
                            id="ssn"
                            pattern="\d{3}-\d{2}-\d{4}"
                            title="Numbers only"
                            placeholder="123-45-6789"
                            oninput="validateSsn(); formatSSN()"
                            onblur="validateSsn()"
                        />
                        <br>
                        <span class="error" id="ssn-error"></span>
                    </td>
                </tr>
                <tr>
                    <th colspan="4"><hr></th> <!--divider line-->
                </tr>
                <tr>
                    <th colspan="4">Patient's Contact Information</th>
                </tr>
                <tr>                
                    <td class="td1"><label for="address1">Address Line 1:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="address1"
                        id="address1"
                        maxlength="40"
                        required
                        title="Please enter your address"
                        placeholder="Ex. 123 Street Drive"
                        oninput="validateAddress()"
                        onblur="validateAddress()"
                        />
                    </br>   
                    <span class="error" id="address1-error"></span>   
                    </td>
                        
                    </td>  
                </tr>
                <tr>                
                    <td class="td1"><label for="address2">Address Line 2:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="address2"
                        id="address2"
                        maxlength="40"
                        title="Please enter your address line 2"
                        placeholder="Ex. Apt. 123"
                        onblur="validateAddress2()"
                        />
                        <br>
                        <span class="error" id="address2-error"></span>
                    </td>  
                </tr>
                <tr>                
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="city"
                        id="city"
                        maxlength="30"
                        required
                        title="Please enter your city"
                        placeholder="Ex. Houston"
                        oninput="validateCity()"
                        onblur="validateCity()"
                        onfocus="validateCity()"
                        />
                    </br>   
                    <span class="error" id="city-error"></span> 
                    </td>  
                </tr>
                <tr>
                <td class="td1"><label for="state">State:</label></td>
                <td>
	                <select name="state" id="state" onblur="validateState()" onchange="validateState()"> 
                        <option value="" disabled selected>Please Select One</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="DC">District of Columbia</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="GU">Guam</option>	
                        <option value="HI">Hawaii</option>	
                        <option value="ID">Idaho</option>	
                        <option value="IL">Illinois</option>	
                        <option value="IN">Indiana</option>	
                        <option value="IA">Iowa</option>	
                        <option value="KS">Kansas</option>	
                        <option value="KY">Kentucky</option>	
                        <option value="LA">Louisiana</option>	
                        <option value="ME">Maine</option>	
                        <option value="MD">Maryland</option>	
                        <option value="MA">Massachusetts</option>	
                        <option value="MI">Michigan</option>	
                        <option value="MN">Minnesota</option>	
                        <option value="MS">Mississippi</option>	
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>	
                        <option value="NH">New Hampshire</option>	
                        <option value="NJ">New Jersey</option>	
                        <option value="NM">New Mexico</option>	
                        <option value="NY">New York</option>	
                        <option value="NC">North Carolina</option>	
                        <option value="ND">North Dakota</option>	
                        <option value="OH">Ohio</option>	
                        <option value="OK">Oklahoma</option>	
                        <option value="OR">Oregon</option>	
                        <option value="PA">Pennsylvania</option>	
                        <option value="PR">Puerto Rico</option>	
                        <option value="RI">Rhode Island</option>	
                        <option value="SC">South Carolina</option>	
                        <option value="SD">South Dakota</option>	
                        <option value="TN">Tennessee</option>	
                        <option value="TX">Texas</option>	
                        <option value="UT">Utah</option>	
                        <option value="VT">Vermont</option>	
                        <option value="VA">Virginia</option>	
                        <option value="WA">Washington</option>	
                        <option value="WV">West Virginia</option>	
                        <option value="WI">Wisconsin</option>	
                        <option value="WY">Wyoming</option>	
                    </select>
                    <br>
                    <span class="error" id="state-error"></span>
                </td>
            </tr>
            <tr>                
                <td class="td1"><label for="zcode">Zip Code:</label></td>
                <td>
                        <input 
                        type="text"
                        name="zcode"
                        id="zcode"
                        pattern="[0-9]{5}"
                        maxlength="5"
                        required
                        title="Numbers only"
                        placeholder="Ex. 77001"
                        oninput="validateZcode()"
                        onblur="validateZcode()"
                        />
                </br>   
                <span class="error" id="zcode-error"></span>   
                </td>
            </tr>
            <tr>                
                <td class="td1"><label for="email">Email Address:</label></td>
                <td>
                        <input 
                        type="text"
                        name="email"
                        id="email"
                        required
                        maxlength="40"
                        title="Please enter you email address"
                        placeholder="Ex. john.doe@example.com"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                        oninput="validateEmail()"
                        onblur="validateEmail()"
                        />
                </br>   
                <span class="error" id="email-error"></span>
                </td>
            </tr>
            <tr>                
                <td class="td1"><label for="pnumber">Phone Number:</label></td>
                <td>
                        <input 
                        type="text"
                        name="pnumber"
                        id="pnumber"
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        maxlength="12"
                        required
                        title="Please enter your phone number in the format XXX-XXX-XXXX"
                        placeholder="Ex. 123-456-7890"
                        oninput="validatePnumber()"
                        onblur="validatePnumber()"
                        />
                </br>   
                <span class="error" id="pnumber-error"></span>
                </td>
            </tr>
            <tr>
                <th colspan="4"><hr></th> <!--divider line-->
            </tr>
            <!--patient history section-->
            <tr>
                <th colspan="4">Patient's History</th>
            </tr>
            <tr>
                <td class="td1"><label for="pat_his">Have you ever had/are you <br> currently experiencing?</label></td>
                <td>
                    <input type="checkbox" id="Option1" value="Chicken Pox"/>
                    <label for="Option1">Chicken Pox</label><br>

                    <input type="checkbox" id="Option2" value="Measles"/>
                    <label for="Option2">Measles</label><br>

                    <input type="checkbox" id="Option3" value="Covid-19"/>
                    <label for="Option3">Covid-19</label><br>

                    <input type="checkbox" id="Option4" value="Tetanus"/>
                    <label for="Option4">Tetanus</label><br>
                    
                    <input type="checkbox" id="Option5" value="Rosacea"/>
                    <label for="Option5">Rosacea</label><br>

                    <input type="checkbox" id="Option6" value="Other"/>
                    <label for="Option6">Other</label><br>
                </td>
            </tr>
            <tr>
                <td class="td1" align="right">
                    <label for="other">If other, please specify:</label>
                </td>
                <td>
                    <textarea
                    rows="4"
                    cols="30"
                    maxlength="500"
                    id="notes"
                    name="notes"
                    title="Please specify any other medical conditions."
                    placeholder="Ex. I have asthma and allergies to pollen and dust"
                    ></textarea>
                    <span id="description_text"></span>
                </td>
            </tr>
            <!--HTML for range slider-->
            <tr>
               <td class="td1"><label for="range">Urgency of Appointment?<br/>(Rate from 1-10)</label></td>
               <td>
                    <input
                    type="range"
                    name="range"
                    id="range"
                    min="1"
                    max="10"
                    value="1"
                    required
                    />
                    <span id="range-slider"></span>
               </td>
            </tr>
            <tr>
                <th colspan="4"><hr></th> <!--divider line-->
            </tr>
            <!--account information section-->
            <tr>
                <th colspan="4">Finish Patient Portal Account:</th>
            </tr>
            <tr>
                    <td class="td1"><label for="uname">Username:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="uname"
                        id="uname"
                        minlength="5"
                        maxlength="20"
                        required
                        title="Username must be between 5 and 15 characters and contain only letters and numbers"
                        placeholder="Ex. JohnDoe123"
                        onblur="validateUname()"
                        oninput="validateUname()"
                        />
                    </br>   
                    <span class="error" id="uname-error"></span>   
                    </td>  
                </tr>
                <tr>
                    <td class="td1"><label for="pword">Password:</label></td>
                    <td>
                        <div class = "pword-container">
                                <input
                                    type="password"
                                    name="pword"
                                    id="pword"
                                    minlength="8"
                                    maxlength="30"
                                    required
                                    title="Please enter a password"
                                    placeholder="Ex. Hope123!"
                                    onblur="validatePassword()"
                                    oninput="validatePassword()"
                                    onfocus="validatePassword()"
                                />  
                        </div>
                        <span class="error" id="pword-error"></span>
                    </td>  
                </tr>
                <tr>
                    <td class="td1"><label for="con_pword">Confirm Password:</label></td>
                    <td>
                        <input 
                        type="password"
                        name="con_pword"
                        id="con_pword"
                        minlength="8"
                        maxlength="30"
                        required
                        title="Password must contain at least 8 characters and match the password entered above"
                        placeholder="Required"
                        onblur="confirmPassword()"
                        oninput="confirmPassword()"
                        onfocus="confirmPassword()"
                        />
                    <br>   
                    <span class="error" id="con_password-error"></span>
                    </td>  
                </tr>
                <tr>
                    <td class="td1" colspan="4" style="padding-top: 20px;">
                        <div class="button-group">
                            <input type="reset" id="reset" value="Reset" />
                            <input type="button" id="review" value="Review" onclick="reviewInput()" />
                            <input type="button" id="validate" value="Validate" onclick="handleValidate()" />
                            <input type="submit" id="submitBtn" value="Submit" style="display:none;">
                        </div>               
         <div id="ShowInput"></div>
    </td>
</tr>
    </table>
    </div>

    <div class="message-group">
    <span id="msg1"></span>
    <span id="msg2"></span>
    <span id="msg3"></span>
    <span id="msg4"></span>
    <span id="msg5"></span>
    <span id="msg6"></span>

    <p id="review-message" style="text-align: center;"></p>
</div>
</form>
<!--footer starts here-->
<footer>
    <p id="footer">
        &copy; 2026 Hope Clinic. All rights reserved. |
        <a href="https://www.bauer.uh.edu/search/contact-us.php" target="_blank" rel="noopener norefer"> Contact Us </a>
    </p>
</footer>
<script src="hw3.js"></script> <!--link to JavaScript file-->

<!-- Inserts alert box into form when validation fails -->
<div id="alert-box">
    <div id="alert-content">
        <h4>Please fill out all required information.</h4>
        <button id="close-alert">OK</button>
    </div>
</div>
    </body>
</html>
